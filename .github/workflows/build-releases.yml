name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-13, macos-14, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: Sorterr-Windows.exe
          - os: macos-13
            artifact_name: Sorterr-macOS-Intel
          - os: macos-14
            artifact_name: Sorterr-macOS-Apple-Silicon
          - os: ubuntu-latest
            artifact_name: Sorterr-Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi
          # Determine icon based on OS
          ICON_FLAG=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            ICON_FLAG="--icon=assets/icon.ico"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            ICON_FLAG="--icon=assets/icon.icns"
          fi

          # Use eel's bundling mode with the new icon
          python -m eel main.py web --onefile --name Sorterr --noconsole $ICON_FLAG
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/Sorterr.exe dist/${{ matrix.artifact_name }}
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS creates a .app directory. Zip it to preserve permissions.
            cd dist
            zip -r ${{ matrix.artifact_name }}.zip Sorterr.app
            cd ..
          else
            mv dist/Sorterr dist/${{ matrix.artifact_name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            Sorterr-Windows.exe/Sorterr-Windows.exe
            Sorterr-macOS-Intel/Sorterr-macOS-Intel.zip
            Sorterr-macOS-Apple-Silicon/Sorterr-macOS-Apple-Silicon.zip
            Sorterr-Linux/Sorterr-Linux
