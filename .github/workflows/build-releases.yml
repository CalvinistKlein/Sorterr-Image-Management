name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: Sorterr-Windows.exe
          - os: macos-latest
            artifact_name: Sorterr-macOS
          - os: ubuntu-latest
            artifact_name: Sorterr-Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Use eel's bundling mode
          python -m eel main.py web --onefile --name Sorterr --noconsole
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/Sorterr.exe dist/${{ matrix.artifact_name }}
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS creates a .app directory. Zip it to preserve permissions.
            cd dist
            zip -r ${{ matrix.artifact_name }}.zip Sorterr.app
            cd ..
          else
            mv dist/Sorterr dist/${{ matrix.artifact_name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Sorterr-Windows.exe/Sorterr-Windows.exe
            Sorterr-macOS/Sorterr-macOS.zip
            Sorterr-Linux/Sorterr-Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
